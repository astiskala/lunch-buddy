name: CI

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'angular.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vercel.json'
      - 'ngsw-config.json'
      - 'ngsw-config.template.json'
      - '.releaserc.json'
      - 'tools/**'
      - 'src/**'
      - 'public/**'
      - 'mock-server/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
      - 'angular.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vercel.json'
      - 'ngsw-config.json'
      - 'ngsw-config.template.json'
      - '.releaserc.json'
      - 'tools/**'
      - 'src/**'
      - 'public/**'
      - 'mock-server/**'

jobs:
  build-and-test:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate runtime environment
        run: npm run generate:env

      - name: Type check
        run: npm run typecheck

      - name: Lint (TypeScript & templates)
        run: npx ng lint --fix=false

      - name: Lint styles
        run: npx stylelint "**/*.scss" --max-warnings=0

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run unit tests
        run: npm test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lunch-buddy/lcov.info
          fail_ci_if_error: false
          flags: unittests
          name: codecov-umbrella

      - name: Build
        run: npm run build

  release:
    name: Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      CI: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
