# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-eslint/*'
          - 'angular-eslint'
          - 'rxjs'
          - 'tslib'
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
          - 'prettier'
          - 'stylelint'
          - 'stylelint-*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@playwright/*'
          - '@axe-core/playwright'
          - 'jsdom'
      release-workflow:
        patterns:
          - 'semantic-release'
          - '@semantic-release/*'
          - '@commitlint/*'
          - 'husky'
          - 'lint-staged'
      typescript-tooling:
        patterns:
          - 'typescript'
          - '@types/node'
      platform:
        patterns:
          - '@modelcontextprotocol/sdk'
          - '@upstash/redis'
          - 'vercel'
          - '@vercel/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/London
    groups:
      github-actions:
        patterns:
          - '*'
