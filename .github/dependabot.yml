# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-eslint/*'
          - 'angular-eslint'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@playwright/*'
          - '@axe-core/playwright'
          - 'jsdom'
      semantic-release:
        patterns:
          - 'semantic-release'
          - '@semantic-release/*'
      commitlint:
        patterns:
          - '@commitlint/*'
      stylelint:
        patterns:
          - 'stylelint'
          - 'stylelint-*'
      vercel:
        patterns:
          - 'vercel'
          - '@vercel/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/London
    groups:
      github-actions:
        patterns:
          - '*'
